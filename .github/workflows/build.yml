name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release after build'
        required: false
        default: 'false'
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: android-macos-arm64
            ext: tar.gz

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: android-macos-x64
            ext: tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: android-windows-x64
            ext: zip

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: android-linux-x64
            ext: tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: android-linux-arm64
            ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev protobuf-compiler
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install protoc -y

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Configure cross-compilation (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          strip android || true
          tar -czvf ${{ matrix.artifact }}.tar.gz android
          mv ${{ matrix.artifact }}.tar.gz $GITHUB_WORKSPACE

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ${{ matrix.artifact }}.zip android.exe
          mv ${{ matrix.artifact }}.zip $env:GITHUB_WORKSPACE

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error
          retention-days: 30